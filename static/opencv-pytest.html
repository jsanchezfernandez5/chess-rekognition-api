<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Chess Rekognition · API Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

        :root {
            --bg: #0f0f11;
            --surface: #1a1a1f;
            --border: #2a2a32;
            --text: #f0f0f5;
            --muted: #8a8a98;
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;
            --mono: 'Space Mono', monospace;
            --display: 'Syne', sans-serif;
            --radius: 18px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            min-height: 100vh;
            max-width: 440px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--display);
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--text);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg);
            font-size: 16px;
        }

        .lab-badge {
            font-size: 9px;
            background: var(--green);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .card-title {
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        video, img {
            width: 100%;
            border-radius: var(--radius-sm);
            background: #000;
            display: block;
            border: 1px solid var(--border);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 10px;
            color: var(--muted);
            transition: all 0.3s;
        }

        .status-pill.ok { color: var(--green); background: rgba(34, 197, 94, 0.1); }
        .status-pill.error { color: var(--red); background: rgba(239, 68, 68, 0.1); }

        .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .dot.blink { animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .btn {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover { background: #25252b; border-color: var(--muted); }
        .btn.primary { background: var(--text); color: var(--bg); border: none; }
        .btn.primary:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .stat-box {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: var(--radius-sm);
            text-align: center;
        }

        .stat-val {
            font-family: var(--display);
            font-size: 24px;
            font-weight: 800;
            color: var(--green);
            line-height: 1;
        }

        .stat-lbl {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--muted);
            border-top-color: var(--text);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #logs {
            font-size: 10px;
            color: var(--muted);
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            padding-top: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <div class="logo-icon">♔</div>
            Chess Rekognition
        </div>
        <div class="lab-badge">Python API</div>
    </header>

    <div class="container">
        <!-- CÁMARA IMAGEN -->
        <div class="card">
            <div class="card-title">
                Cámara en vivo
                <div id="camStatus" class="status-pill"><div class="dot blink"></div> OFF</div>
            </div>
            <video id="webcam" autoplay playsinline></video>
            <div class="controls">
                <button id="snap" class="btn primary">Capturar</button>
                <button id="autoToggle" class="btn">Modo Auto: OFF</button>
            </div>
        </div>

        <!-- RESULTADOS -->
        <div class="card">
            <div class="card-title">
                Tablero Rectificado (API)
                <div id="apiStatus" class="status-pill">Esperando...</div>
            </div>
            <img id="resultImage" style="background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAAXNSR0IArs4c6QAAACpJREFUGFdjZEADTAwMDIwMDAz/GRgYmBgYGP6DMTIwMDAyMDAwMDQAAC7DBAXe536NAAAAAElFTkSuQmCC');">
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div id="squaresCount" class="stat-val">0</div>
                    <div class="stat-lbl">Casillas</div>
                </div>
                <div class="stat-box">
                    <div id="latencyVal" class="stat-val">0</div>
                    <div class="stat-lbl">ms Latencia</div>
                </div>
            </div>
        </div>

        <!-- DEBUG -->
        <div class="card">
            <div class="card-title">Visión : Depuración Bordes</div>
            <img id="debugImage">
            <div id="logs"></div>
        </div>
    </div>

    <!-- CANVAS OCULTO PARA CAPTURA -->
    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('hiddenCanvas');
        const snapBtn = document.getElementById('snap');
        const autoBtn = document.getElementById('autoToggle');
        const resultImg = document.getElementById('resultImage');
        const debugImg = document.getElementById('debugImage');
        const apiStatus = document.getElementById('apiStatus');
        const squaresVal = document.getElementById('squaresCount');
        const latencyVal = document.getElementById('latencyVal');
        const logs = document.getElementById('logs');

        let isAuto = false;
        let isProcessing = false;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720, facingMode: 'environment' }
                });
                video.srcObject = stream;
                document.getElementById('camStatus').innerHTML = '<div class="dot" style="background:var(--green)"></div> LIVE';
                log("Cámara iniciada correctamente");
            } catch (err) {
                log("Error cámara: " + err, true);
                document.getElementById('camStatus').innerHTML = '<div class="dot" style="background:var(--red)"></div> ERROR';
            }
        }

        function log(msg, isError = false) {
            const time = new Date().toLocaleTimeString();
            const color = isError ? 'var(--red)' : 'var(--muted)';
            logs.innerHTML = `<div style="color:${color}">[${time}] ${msg}</div>` + logs.innerHTML;
        }

        async function processFrame() {
            if (isProcessing) return;
            isProcessing = true;

            const startTime = performance.now();
            
            // Dibujar frame en canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            apiStatus.innerText = "Procesando...";
            apiStatus.className = "status-pill";

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'frame.jpg');

                try {
                    const response = await fetch('/vision/recognize-board', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    const endTime = performance.now();
                    latencyVal.innerText = Math.round(endTime - startTime);

                    if (data.success) {
                        resultImg.src = data.rectified_image;
                        debugImg.src = data.debug_image;
                        squaresVal.innerText = data.num_squares;
                        squaresVal.style.color = data.num_squares === 64 ? 'var(--green)' : 'var(--amber)';
                        
                        apiStatus.innerHTML = '<div class="dot"></div> DETECTADO';
                        apiStatus.className = "status-pill ok";
                    } else {
                        apiStatus.innerText = data.error || "No detectado";
                        apiStatus.className = "status-pill error";
                        squaresVal.innerText = "0";
                        squaresVal.style.color = "var(--red)";
                    }
                } catch (err) {
                    log("Error API: " + err, true);
                    apiStatus.innerText = "Error Servidor";
                    apiStatus.className = "status-pill error";
                } finally {
                    isProcessing = false;
                    if (isAuto) setTimeout(processFrame, 100);
                }
            }, 'image/jpeg', 0.7);
        }

        snapBtn.onclick = () => {
            isAuto = false;
            autoBtn.innerText = "Modo Auto: OFF";
            processFrame();
        };

        autoBtn.onclick = () => {
            isAuto = !isAuto;
            autoBtn.innerText = `Modo Auto: ${isAuto ? 'ON' : 'OFF'}`;
            autoBtn.style.borderColor = isAuto ? 'var(--green)' : 'var(--border)';
            if (isAuto) processFrame();
        };

        initCamera();
    </script>
</body>

</html>
