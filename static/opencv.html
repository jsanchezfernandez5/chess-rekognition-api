<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Rekognition</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        h1 { font-size: 20px; margin-bottom: 10px; }
        video { width: 100%; max-width: 600px; border: 1px solid #ccc; display: block; }
        button { margin: 5px; padding: 8px 16px; cursor: pointer; }
        img { max-width: 280px; border: 1px solid #ccc; margin: 5px; }
        #logs { background: #fff; border: 1px solid #ccc; padding: 8px; font-size: 11px; max-height: 80px; overflow-y: auto; margin-top: 10px; }
        table { border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 5px 10px; }
        .ocupada { background: #fdd; }
        #estado { font-weight: bold; }
    </style>
</head>
<body>

    <h1>Chess Rekognition — Lab</h1>

    <!-- Cámara -->
    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div>
        <button id="btnCapturar">Capturar</button>
        <button id="btnAuto">Auto: OFF</button>
        <button id="btnReporte" disabled>Descargar Reporte</button>
        <span id="estado">—</span>
    </div>

    <!-- Imágenes resultado -->
    <div>
        <div>
            <p>Vista aérea (real)</p>
            <img id="imgReal" alt="Sin imagen">
        </div>
        <div>
            <p>Vista diagnóstico (2D)</p>
            <img id="img2D" alt="Sin imagen">
        </div>
        <div>
            <p>Tablero detectado</p>
            <img id="imgDebug" alt="Sin imagen">
        </div>
    </div>

    <!-- Stats básicos -->
    <p>Casillas ocupadas: <strong id="ocupadas">—</strong> | Latencia: <strong id="latencia">—</strong> ms</p>

    <!-- Tabla de diagnóstico -->
    <table>
        <thead>
            <tr>
                <th>Casilla</th>
                <th>Estado</th>
                <th>STD</th>
                <th>Edges</th>
            </tr>
        </thead>
        <tbody id="tablaDiag"></tbody>
    </table>

    <!-- Log de eventos -->
    <div id="logs">Esperando cámara...</div>

    <script>
        // Referencias a los elementos del DOM
        const video      = document.getElementById('webcam');
        const canvas     = document.getElementById('canvas');
        const btnCap     = document.getElementById('btnCapturar');
        const btnAuto    = document.getElementById('btnAuto');
        const btnRep     = document.getElementById('btnReporte');
        const estado     = document.getElementById('estado');
        const imgReal    = document.getElementById('imgReal');
        const img2D      = document.getElementById('img2D');
        const imgDebug   = document.getElementById('imgDebug');
        const ocupadas   = document.getElementById('ocupadas');
        const latencia   = document.getElementById('latencia');
        const tablaDiag  = document.getElementById('tablaDiag');
        const logs       = document.getElementById('logs');

        let modoAuto    = false;   // controla si está en captura automática
        let procesando  = false;   // evita llamadas simultáneas a la API
        let ultimoB64   = null;    // guarda la última imagen de reporte

        // Escribe una línea en el panel de logs con la hora actual
        function log(msg) {
            const hora = new Date().toLocaleTimeString();
            logs.innerHTML = `[${hora}] ${msg}<br>` + logs.innerHTML;
        }

        // Inicia la cámara (preferiblemente la trasera en móvil)
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
                log("Cámara iniciada");
            } catch (err) {
                log("Error al iniciar cámara: " + err);
            }
        }

        // Captura un frame, lo envía a la API y actualiza la UI con la respuesta
        async function procesarFrame() {
            if (procesando) return;
            procesando = true;

            const inicio = performance.now();

            // Dibuja el frame actual del vídeo en el canvas oculto
            canvas.width  = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            estado.innerText = "Procesando...";

            // Convierte el canvas a Blob JPEG y lo manda como FormData
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('file', blob);

                try {
                    const res  = await fetch('/vision/recognize-board', { method: 'POST', body: fd });
                    const data = await res.json();

                    // Actualiza la latencia
                    latencia.innerText = Math.round(performance.now() - inicio);

                    if (data.success) {
                        // Muestra las imágenes devueltas por el backend
                        imgReal.src  = data.rectified_real;
                        img2D.src    = data.rectified_2d;
                        imgDebug.src = data.debug_image;

                        // Actualiza el contador de casillas ocupadas
                        ocupadas.innerText = `${data.occupied_count} / ${data.num_squares}`;

                        estado.innerText = data.status || "OK";

                        // Si el backend devuelve imagen de reporte, la guardamos para descarga
                        if (data.export_image) {
                            ultimoB64       = data.export_image;
                            btnRep.disabled = false;
                        }

                        // Rellena la tabla de diagnóstico con las 15 casillas de mayor STD
                        actualizarTabla(data.squares);

                    } else {
                        estado.innerText = "Error: " + data.error;
                        log("Error API: " + data.error);
                    }

                } catch (e) {
                    log("Fallo en fetch: " + e);
                } finally {
                    procesando = false;
                    // Si sigue en modo auto, lanza otro ciclo tras 180ms
                    if (modoAuto) setTimeout(procesarFrame, 180);
                }
            }, 'image/jpeg', 0.8);
        }

        // Ordena las casillas por STD descendente y pinta las 15 primeras en la tabla
        function actualizarTabla(casillas) {
            const top15 = casillas
                .sort((a, b) => b.std - a.std)
                .slice(0, 15);

            tablaDiag.innerHTML = top15.map(c => `
                <tr class="${c.occupied ? 'ocupada' : ''}">
                    <td>${c.id}</td>
                    <td>${c.occupied ? 'Ocupada' : 'Vacía'}</td>
                    <td>${c.std}</td>
                    <td>${c.edges}</td>
                </tr>
            `).join('');
        }

        // Botón captura manual: desactiva el auto y lanza un ciclo
        btnCap.onclick = () => {
            modoAuto = false;
            btnAuto.innerText = "Auto: OFF";
            procesarFrame();
        };

        // Botón auto: alterna entre ON y OFF
        btnAuto.onclick = () => {
            modoAuto = !modoAuto;
            btnAuto.innerText = `Auto: ${modoAuto ? 'ON' : 'OFF'}`;
            if (modoAuto) procesarFrame();
        };

        // Botón reporte: descarga la última imagen de reporte como JPG
        btnRep.onclick = () => {
            if (!ultimoB64) return;
            const a      = document.createElement('a');
            a.href       = ultimoB64;
            a.download   = `reporte_${Date.now()}.jpg`;
            a.click();
            log("Reporte descargado");
        };

        // Arranca la cámara al cargar la página
        initCamera();
    </script>
</body>
</html>
